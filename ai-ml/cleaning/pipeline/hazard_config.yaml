dataset_type: "hazard_event"


schema_mapping:
  event_id: "hazard_event_id"
  event_type: "hazard_type"
  severity: "severity_level"
  timestamp: "start_time"

missing_values:
  drop:
    - "hazard_event_id"
    - "start_time"
  fill:
    hazard_type: "unknown"
    severity_level: "monitoring"
    event_status: "monitoring"

duplicates:
  subset:
    - "hazard_event_id"

type_conversion:
  datetime:
    - "start_time"

string_standardisation:
  lower:
    - "severity_level"
    - "event_status"
  capitalize:
    - "hazard_type"


validation:
  severity_level: ["low", "medium", "high", "critical"]
  event_status: ["active", "resolved", "monitoring"]