services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file:
    - ./.env
    environment:
      - SERVICE=api-gateway
    depends_on:
      - user-service

  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "50051:50051"
    env_file:
    - ./.env
    environment:
      - SERVICE=user-service
    command: sh -c "node -r tsconfig-paths/register dist/user-service/src/app.js"

  data-ingestion-service:
    build: ./backend/data-ingestion-service
    container_name: ingestion-service
    ports:
      - "50053:50053"
    env_file:
    - ./.env
    environment:
      - SERVICE=user-service
    command: sh -c "node -r tsconfig-paths/register dist/data-ingestion-service/src/app.js"